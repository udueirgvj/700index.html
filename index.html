<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFFp Hotspot</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        /* نفس التنسيقات السابقة مع إضافة أنماط للأخطاء */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(145deg, #0b2b3f 0%, #1b4f6e 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 15px; }
        .card { background: white; border-radius: 30px; padding: 25px 20px; max-width: 550px; width: 100%; box-shadow: 0 30px 60px rgba(0,0,0,0.3); }
        h1 { color: #1b4f6e; text-align: center; margin-bottom: 10px; font-size: 2rem; }
        .badge { background: #ffb74d; color: #0b2b3f; padding: 5px 15px; border-radius: 50px; display: inline-block; margin-bottom: 20px; font-weight: bold; }
        .section { background: #f5f9ff; border-radius: 20px; padding: 20px; margin-bottom: 20px; border-right: 5px solid #ffb74d; }
        .section h2 { color: #0b2b3f; font-size: 1.4rem; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .info-box { background: white; border-radius: 15px; padding: 15px; margin: 10px 0; border: 1px solid #ddd; }
        .label { color: #666; font-size: 0.9rem; margin-bottom: 5px; }
        .value { font-size: 1.3rem; font-weight: bold; color: #1b4f6e; direction: ltr; word-break: break-all; background: #f0f0f0; padding: 10px; border-radius: 10px; margin-top: 5px; }
        .btn { background: #ffb74d; border: none; color: #0b2b3f; padding: 15px 25px; font-size: 1.2rem; font-weight: bold; border-radius: 15px; width: 100%; cursor: pointer; margin: 15px 0 5px; transition: all 0.3s; }
        .btn:hover { background: #ffa726; transform: scale(1.02); }
        .qr-placeholder { text-align: center; margin: 20px 0; padding: 20px; background: #f0f0f0; border-radius: 15px; }
        .request-list { background: #fff3e0; border-radius: 15px; padding: 15px; max-height: 200px; overflow-y: auto; }
        .request-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #ffb74d; }
        .request-name { font-weight: bold; color: #1b4f6e; }
        .request-time { color: #666; font-size: 0.8rem; }
        .loading { text-align: center; color: #666; padding: 20px; }
        .error { text-align: center; color: #d32f2f; background: #ffcdd2; padding: 20px; border-radius: 15px; margin: 20px 0; }
        .footer { text-align: center; color: #999; font-size: 0.8rem; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>📡 FFFp Hotspot</h1>
        <div style="text-align: center;"><span class="badge">اتصال سریع و آمن</span></div>

        <div id="loading" class="loading">
            ⏳ جاري تحميل البيانات...
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div id="content" style="display: none;">
            <!-- محتوى الشبكة المحلية -->
            <div class="section">
                <h2>📱 للقريبين (واي فاي)</h2>
                <div class="info-box">
                    <div class="label">📶 اسم الشبكة (SSID)</div>
                    <div class="value" id="networkName">---</div>
                </div>
                <div class="info-box">
                    <div class="label">🔑 كلمة المرور</div>
                    <div class="value" id="networkPassword">---</div>
                </div>
                <div id="qrContainer" class="qr-placeholder"></div>
                <button class="btn" onclick="openWifiSettings()">⚙️ فتح إعدادات الواي فاي</button>
            </div>

            <!-- للبعيدين -->
            <div class="section">
                <h2>🌍 للبعيدين (VPN)</h2>
                <div class="info-box">
                    <div class="label">🔗 مفتاح Tailscale (اضغط للنسخ)</div>
                    <div class="value" id="tailscaleKey" onclick="copyTailscaleKey()" style="cursor: pointer;">---</div>
                </div>
            </div>

            <!-- طلب اتصال -->
            <div class="section" style="background: #e8f5e9; border-right-color: #4caf50;">
                <h2>🟢 طلب اتصال جديد</h2>
                <button class="btn" onclick="requestConnection()">🚀 اضغط للاتصال</button>
            </div>

            <!-- قائمة الطلبات -->
            <div class="section">
                <h2>📋 آخر طلبات الاتصال</h2>
                <div id="requestsList" class="request-list"></div>
            </div>

            <div class="footer">
                آخر تحديث: <span id="lastUpdated">---</span>
            </div>
        </div>
    </div>

    <script>
        // 🔴 استبدل هذا الرابط بالرابط الصحيح من Firebase Console
        const firebaseConfig = {
            apiKey: "AIzaSyCYnCu8VkoOAOhnJTZBVmSGcPSeKB4vCAM",
            authDomain: "tygggfs.firebaseapp.com",
            databaseURL: "https://tygggfs-default-rtdb.firebaseio.com", // <-- غير هذا الرابط
            projectId: "tygggfs",
            storageBucket: "tygggfs.firebasestorage.app",
            messagingSenderId: "532770652661",
            appId: "1:532770652661:web:b6a6722f184a3d70cf60bc",
            measurementId: "G-HC88Y95PHL"
        };

        // محاولة تهيئة Firebase
        try {
            firebase.initializeApp(firebaseConfig);
            console.log("Firebase initialized");
        } catch (e) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error').innerText = '❌ خطأ في تهيئة Firebase: ' + e.message;
        }

        const database = firebase.database();
        const connectionRef = database.ref('connection');
        const requestsRef = database.ref('requests');

        // عناصر الصفحة
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        const contentEl = document.getElementById('content');
        const networkNameEl = document.getElementById('networkName');
        const networkPasswordEl = document.getElementById('networkPassword');
        const tailscaleKeyEl = document.getElementById('tailscaleKey');
        const lastUpdatedEl = document.getElementById('lastUpdated');
        const requestsListEl = document.getElementById('requestsList');
        const qrContainer = document.getElementById('qrContainer');

        // الاستماع لبيانات الاتصال
        connectionRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                loadingEl.style.display = 'none';
                contentEl.style.display = 'block';

                networkNameEl.innerText = data.networkName || 'غير محدد';
                networkPasswordEl.innerText = data.password || 'غير محدد';
                tailscaleKeyEl.innerText = data.tailscaleKey || 'غير متوفر';
                lastUpdatedEl.innerText = data.lastUpdated || 'غير معروف';

                if (data.networkName && data.password) {
                    generateQRCode(data.networkName, data.password);
                }
            } else {
                loadingEl.style.display = 'none';
                errorEl.style.display = 'block';
                errorEl.innerText = '⚠️ لا توجد بيانات في Firebase. الرجاء إضافة بيانات يدوياً.';
            }
        }, (error) => {
            loadingEl.style.display = 'none';
            errorEl.style.display = 'block';
            errorEl.innerText = '❌ خطأ في قراءة قاعدة البيانات: ' + error.message;
        });

        // الاستماع للطلبات
        requestsRef.orderByChild('timestamp').limitToLast(10).on('value', (snapshot) => {
            if (snapshot.exists()) {
                let html = '';
                const requests = [];
                snapshot.forEach(child => {
                    requests.push(child.val());
                });
                requests.reverse().forEach(req => {
                    const date = new Date(req.timestamp);
                    html += `
                        <div class="request-item">
                            <span class="request-name">${req.name}</span>
                            <span class="request-time">${date.toLocaleString('ar-EG')}</span>
                        </div>
                    `;
                });
                requestsListEl.innerHTML = html;
            } else {
                requestsListEl.innerHTML = '<p style="color: #666;">لا توجد طلبات بعد</p>';
            }
        });

        function generateQRCode(ssid, password) {
            if (!ssid || !password) return;
            const wifiString = `WIFI:S:${ssid};T:WPA;P:${password};;`;
            qrContainer.innerHTML = `
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(wifiString)}" 
                     alt="QR Code" style="border-radius: 10px;">
                <p style="color: #666; margin-top: 10px;">📷 امسح الرمز للاتصال التلقائي</p>
            `;
        }

        function requestConnection() {
            const name = prompt('الرجاء إدخال اسمك (مثال: FFFp-1, FFFp-2):');
            if (!name) return;

            const newRequestRef = requestsRef.push();
            newRequestRef.set({
                name: name,
                timestamp: Date.now(),
                userAgent: navigator.userAgent
            }).then(() => {
                alert(`✅ تم تسجيل طلبك باسم "${name}".`);
            }).catch((error) => {
                alert('❌ حدث خطأ: ' + error.message);
            });
        }

        function openWifiSettings() {
            window.location.href = "intent://#Intent;action=android.settings.WIFI_SETTINGS;end;";
            setTimeout(() => {
                window.location.href = "App-Prefs:root=WIFI";
            }, 500);
        }

        function copyTailscaleKey() {
            const key = tailscaleKeyEl.innerText;
            if (key && key !== 'غير متوفر') {
                navigator.clipboard.writeText(key).then(() => {
                    alert('✅ تم نسخ المفتاح!');
                }).catch(() => {
                    alert('❌ تعذر النسخ، يمكنك تحديده يدوياً.');
                });
            } else {
                alert('❌ المفتاح غير متوفر');
            }
        }
    </script>
</body>
</html>
